name: Build Auth Lab

on:
    push:
        branches:
            - main
    
    pull_request:
        branches:
            - main
    
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source
              uses: actions/checkout@v4
              
            - name: Setup Java 21
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: 21
            
            - name: Build Project
              run: mvn clean package
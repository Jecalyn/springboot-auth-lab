name: Deploy Auth Lab

on:
  workflow_run:
    workflows:
      - Build Auth Lab
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}

          script: |
            cd /root/deployment

            docker compose pull

            docker compose up -d --force-recreate